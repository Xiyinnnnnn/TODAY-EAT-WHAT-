<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>今天吃什么 · 抽卡决定</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#1a1a2e;--card-bg:#16213e;--accent:#e94560;--accent2:#0f3460;--text:#eee;--text2:#aaa;--gold:#ffd700;--shadow:0 10px 40px rgba(0,0,0,.5)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;user-select:none;-webkit-user-select:none;touch-action:pan-y pinch-zoom}
#app{height:100dvh;display:flex;flex-direction:column;position:relative;max-width:480px;margin:0 auto}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(26,26,46,.95);backdrop-filter:blur(10px);z-index:100;border-bottom:1px solid rgba(255,255,255,.05)}
.header .title{font-size:20px;font-weight:700;background:linear-gradient(135deg,#e94560,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .loc-btn{font-size:13px;cursor:pointer;padding:5px 12px;border-radius:20px;background:none;border:1px solid rgba(255,255,255,.15);color:var(--text2);transition:.2s;display:flex;align-items:center;gap:4px;white-space:nowrap}
.header .loc-btn:hover{background:rgba(255,255,255,.08);border-color:var(--accent)}
.header .loc-btn:active{transform:scale(.95)}
.header .loc-btn.active{color:#4fc3f7;border-color:#4fc3f7}
.header .menu-btn{font-size:24px;cursor:pointer;padding:4px 8px;border-radius:8px;transition:.2s;background:none;border:none;color:var(--text)}

/* Card Area */
.card-area{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:16px}
.card-stack{position:relative;width:100%;height:100%;max-width:380px;max-height:520px;perspective:1200px}
.card{position:absolute;width:100%;height:100%;border-radius:24px;background:var(--card-bg);box-shadow:var(--shadow);overflow:hidden;cursor:grab;transition:transform .3s cubic-bezier(.2,0,0,1),opacity .3s ease;will-change:transform;backface-visibility:hidden;touch-action:pan-y}
.card:active{cursor:grabbing}
.card-inner{padding:24px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative}
.card .emoji{font-size:72px;margin-bottom:12px;line-height:1.2}
.card .name{font-size:28px;font-weight:700;margin-bottom:6px}
.card .sub{font-size:16px;color:var(--text2);margin-bottom:8px}
.card .tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:8px}
.card .tag{padding:4px 12px;border-radius:20px;font-size:12px;background:rgba(233,69,96,.2);color:var(--accent);border:1px solid rgba(233,69,96,.3)}
.card .tag.gold{background:rgba(255,215,0,.15);color:var(--gold);border-color:rgba(255,215,0,.3)}
.card .tag.green{background:rgba(46,204,113,.15);color:#2ecc71;border-color:rgba(46,204,113,.3)}
.card .distance{font-size:14px;color:#4fc3f7;margin-top:4px;display:flex;align-items:center;gap:4px}
.card .source-badge{position:absolute;top:16px;right:16px;font-size:11px;padding:3px 10px;border-radius:12px;background:rgba(255,255,255,.08);color:var(--text2)}
.card .action-hint{position:absolute;bottom:20px;font-size:13px;color:var(--text2);opacity:.6}
.card .like-overlay,.card .nope-overlay{position:absolute;top:24px;font-size:48px;font-weight:900;opacity:0;transition:opacity .15s;pointer-events:none;text-shadow:0 2px 12px rgba(0,0,0,.5)}
.card .like-overlay{right:24px;color:#2ecc71;transform:rotate(12deg)}
.card .nope-overlay{left:24px;color:#e74c3c;transform:rotate(-12deg)}

/* Card Entry Animation */
.card.entering{animation:cardEnter .45s cubic-bezier(.2,.9,.3,1.1) forwards}
@keyframes cardEnter{
  0%{transform:translateY(100%) scale(.85);opacity:0}
  100%{transform:translateY(0) scale(1);opacity:1}
}
.card.leaving-left{animation:cardLeaveLeft .35s ease-in forwards}
@keyframes cardLeaveLeft{
  0%{transform:translateX(0) rotate(0);opacity:1}
  100%{transform:translateX(-120%) rotate(-18deg);opacity:0}
}
.card.leaving-right{animation:cardLeaveRight .35s ease-in forwards}
@keyframes cardLeaveRight{
  0%{transform:translateX(0) rotate(0);opacity:1}
  100%{transform:translateX(120%) rotate(18deg);opacity:0}
}

/* No Card */
.no-card{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text2);text-align:center;padding:24px}
.no-card .big-emoji{font-size:80px;margin-bottom:16px}
.no-card .hint{font-size:18px;margin-bottom:8px}
.no-card .sub-hint{font-size:14px;color:var(--text2)}

/* Bottom Bar */
.bottom-bar{display:flex;align-items:center;justify-content:center;gap:20px;padding:12px 24px 28px;background:rgba(26,26,46,.95);backdrop-filter:blur(10px);z-index:100;border-top:1px solid rgba(255,255,255,.05)}
.bottom-bar .btn{width:52px;height:52px;border-radius:50%;border:none;font-size:22px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 15px rgba(0,0,0,.3)}
.bottom-bar .btn:hover{transform:scale(1.1)}
.bottom-bar .btn:active{transform:scale(.95)}
.bottom-bar .btn-nope{background:rgba(231,76,60,.2);color:#e74c3c}
.bottom-bar .btn-nope:hover{background:rgba(231,76,60,.35)}
.bottom-bar .btn-shuffle{width:60px;height:60px;background:linear-gradient(135deg,#e94560,#ff6b6b);color:#fff;font-size:26px}
.bottom-bar .btn-shuffle:hover{transform:scale(1.12)}
.bottom-bar .btn-like{background:rgba(46,204,113,.2);color:#2ecc71}
.bottom-bar .btn-like:hover{background:rgba(46,204,113,.35)}
.bottom-bar .btn-nearby{background:rgba(79,195,247,.2);color:#4fc3f7;font-size:20px}
.bottom-bar .btn-nearby:hover{background:rgba(79,195,247,.35)}

/* Side Menu */
.menu-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
.menu-overlay.active{opacity:1;pointer-events:auto}
.menu-panel{position:fixed;top:0;left:0;bottom:0;width:300px;max-width:80vw;background:var(--card-bg);z-index:201;transform:translateX(-100%);transition:transform .3s cubic-bezier(.2,0,0,1);overflow-y:auto;padding:24px 16px}
.menu-panel.active{transform:translateX(0)}
.menu-panel .close-btn{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;padding:4px 8px;border-radius:8px}
.menu-panel h2{font-size:20px;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.1)}
.menu-panel .stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:14px}
.menu-panel .stat-row .val{color:var(--accent);font-weight:600}
.menu-section{margin-top:20px}
.menu-section h3{font-size:16px;margin-bottom:10px;color:var(--text2)}
.menu-section .fav-item{display:flex;align-items:center;justify-content:space-between;padding:10px 8px;border-radius:12px;background:rgba(255,255,255,.04);margin-bottom:6px;font-size:14px}
.menu-section .fav-item .fi-emoji{font-size:24px;margin-right:10px}
.menu-section .fav-item .fi-name{flex:1}
.menu-section .fav-item .fi-del{background:none;border:none;color:#e74c3c;font-size:16px;cursor:pointer;padding:4px 8px;border-radius:6px}
.menu-section .empty-hint{color:var(--text2);font-size:14px;padding:12px 0;text-align:center}
.menu-section .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.menu-section .toggle-row label{font-size:14px}
.switch{position:relative;width:44px;height:24px;background:rgba(255,255,255,.15);border-radius:12px;cursor:pointer;transition:.2s;flex-shrink:0}
.switch.on{background:var(--accent)}
.switch .knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
.switch.on .knob{left:22px}
.menu-section .info-text{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.5}

/* Toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);backdrop-filter:blur(8px);color:#fff;padding:10px 24px;border-radius:12px;font-size:14px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;max-width:80vw;text-align:center}
.toast.show{opacity:1}

/* Loading */
.loading-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(26,26,46,.8);backdrop-filter:blur(4px);z-index:50;border-radius:24px}
.loading-overlay .spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay .load-text{margin-top:16px;color:var(--text2);font-size:14px}

.menu-panel::-webkit-scrollbar{width:4px}
.menu-panel::-webkit-scrollbar-track{background:transparent}
.menu-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}

@media(max-width:400px){
  .card .emoji{font-size:56px}
  .card .name{font-size:24px}
  .bottom-bar{gap:14px}
  .bottom-bar .btn{width:46px;height:46px;font-size:18px}
  .bottom-bar .btn-shuffle{width:54px;height:54px;font-size:22px}
}

.history-item{display:flex;align-items:center;padding:8px;border-radius:8px;background:rgba(255,255,255,.03);margin-bottom:4px;font-size:13px;gap:8px}
.history-item .hi-emoji{font-size:18px}
.history-item .hi-name{flex:1}
.history-item .hi-time{color:var(--text2);font-size:11px}
.history-item .hi-action{font-size:12px;padding:2px 8px;border-radius:10px}
.history-item .hi-action.liked{background:rgba(46,204,113,.2);color:#2ecc71}
.history-item .hi-action.skipped{background:rgba(231,76,60,.15);color:#e74c3c}
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="header">
    <button class="menu-btn" id="menuBtn" aria-label="菜单">☰</button>
    <div class="title">🎯 今天吃什么</div>
    <button class="loc-btn" id="locBtn">📍 附近</button>
  </div>

  <!-- Card Area -->
  <div class="card-area" id="cardArea">
    <div class="card-stack" id="cardStack">
      <div class="no-card" id="noCard">
        <div class="big-emoji">🍽️</div>
        <div class="hint">没有更多了</div>
        <div class="sub-hint">点击 🎲 重新洗牌</div>
      </div>
      <div class="loading-overlay" id="loadingOverlay" style="display:none">
        <div class="spinner"></div>
        <div class="load-text" id="loadText">正在搜索附近美食...</div>
      </div>
    </div>
  </div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <button class="btn btn-nope" id="btnNope" aria-label="跳过">✕</button>
    <button class="btn btn-nearby" id="btnNearby" aria-label="附近" title="搜索附近餐厅">📍</button>
    <button class="btn btn-shuffle" id="btnShuffle" aria-label="抽卡">🎲</button>
    <button class="btn btn-like" id="btnLike" aria-label="收藏">♥</button>
  </div>

  <!-- Menu Overlay & Panel -->
  <div class="menu-overlay" id="menuOverlay"></div>
  <div class="menu-panel" id="menuPanel">
    <button class="close-btn" id="menuClose">✕</button>
    <h2>📊 抽卡统计</h2>
    <div class="stat-row"><span>已抽次数</span><span class="val" id="statTotal">0</span></div>
    <div class="stat-row"><span>已收藏</span><span class="val" id="statFav">0</span></div>
    <div class="stat-row"><span>已跳过</span><span class="val" id="statSkip">0</span></div>

    <div class="menu-section">
      <h3>❤️ 我的收藏</h3>
      <div id="favList"><div class="empty-hint">还没有收藏</div></div>
    </div>

    <div class="menu-section">
      <h3>📜 抽卡历史</h3>
      <div id="historyList"><div class="empty-hint">还没有记录</div></div>
    </div>

    <div class="menu-section">
      <h3>⚙️ 设置</h3>
      <div class="toggle-row">
        <label>显示距离</label>
        <div class="switch on" id="toggleDist"><div class="knob"></div></div>
      </div>
      <div class="info-text">在卡片上显示距你的大概距离</div>
      <div class="toggle-row" style="margin-top:8px">
        <label>离线模式（仅内置库）</label>
        <div class="switch" id="toggleOffline"><div class="knob"></div></div>
      </div>
      <div class="info-text">开启后不使用网络查询，仅用内置美食数据库</div>
    </div>

    <div class="menu-section" style="margin-top:24px;padding-top:16px;border-top:1px solid rgba(255,255,255,.08)">
      <div class="info-text">
        <strong>📡 数据来源说明</strong><br>
        • 🌐 实时查询：Overpass API（OpenStreetMap 附近餐厅）<br>
        • 📦 内置库：广州及连锁餐厅数据库（离线可用）<br>
        • 点击底部 📍 按钮主动搜索附近<br>
        • 网络查询失败自动降级到内置库
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>
</div>

// ---------- Overpass API 公共实例 ----------
const OVERPASS_INSTANCES = [
  'https://overpass-api.de/api/interpreter',
  'https://overpass-api.private.coffee/api/interpreter',
  'https://overpass.kumi.systems/api/interpreter',
  'https://overpass.openstreetmap.fr/api/interpreter'
];

// ---------- 缓存管理 ----------
function getCachedOverpass(lat, lng) {
  const key = `eatwhat_op_${lat.toFixed(4)}_${lng.toFixed(4)}`;
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (Date.now() - data.timestamp < 3600000) {
      return data.results;
    }
    localStorage.removeItem(key);
  } catch(e) {}
  return null;
}

function setCachedOverpass(lat, lng, results) {
  const key = `eatwhat_op_${lat.toFixed(4)}_${lng.toFixed(4)}`;
  try {
    localStorage.setItem(key, JSON.stringify({ results, timestamp: Date.now() }));
  } catch(e) {}
}

// ---------- 地理位置（用户点击触发） ----------
function requestLocation() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) {
      showToast('📍 您的浏览器不支持定位', 2000);
      resolve(null);
      return;
    }
    locBtn.textContent = '📍 获取中…';
    locBtn.disabled = true;
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        STATE.userLat = pos.coords.latitude;
        STATE.userLng = pos.coords.longitude;
        STATE.hasLocation = true;
        locBtn.textContent = `📍 ${STATE.userLat.toFixed(3)}, ${STATE.userLng.toFixed(3)}`;
        locBtn.classList.add('active');
        locBtn.disabled = false;
        resolve({ lat: STATE.userLat, lng: STATE.userLng });
      },
      (err) => {
        console.warn('定位失败:', err.message);
        locBtn.textContent = '📍 失败·点击重试';
        locBtn.disabled = false;
        let msg = '定位失败';
        if (err.code === 1) msg = '📵 定位被拒绝，请在浏览器设置中允许定位';
        else if (err.code === 2) msg = '📡 无法获取位置信号';
        else if (err.code === 3) msg = '⏱️ 定位超时，请重试';
        showToast(msg, 2500);
        resolve(null);
      },
      { enableHighAccuracy: false, timeout: 8000, maximumAge: 60000 }
    );
  });
}

// ---------- Overpass API 查询 ----------
async function queryOverpass(lat, lng, radius = 1000) {
  const overpassQuery = `
    [out:json][timeout:5];
    (
      node["amenity"~"restaurant|fast_food|cafe"](around:${radius},${lat},${lng});
      way["amenity"~"restaurant|fast_food|cafe"](around:${radius},${lat},${lng});
    );
    out center 15;
  `.trim();

  for (const instance of OVERPASS_INSTANCES) {
    try {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 5000);
      const resp = await fetch(instance, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'data=' + encodeURIComponent(overpassQuery),
        signal: controller.signal
      });
      clearTimeout(timer);
      if (!resp.ok) {
        console.warn(`Overpass ${instance} 返回 ${resp.status}`);
        continue;
      }
      const data = await resp.json();
      if (data && data.elements && data.elements.length > 0) {
        console.log(`Overpass 从 ${instance} 获取到 ${data.elements.length} 个结果`);
        return data.elements;
      }
    } catch (err) {
      if (err.name === 'AbortError') {
        console.warn(`Overpass ${instance} 超时`);
      } else {
        console.warn(`Overpass ${instance} 请求失败:`, err.message);
      }
      continue;
    }
  }
  return null;
}

// ---------- 转换 Overpass 结果为卡片 ----------
function overpassToCards(elements, lat, lng) {
  const cards = [];
  const seen = new Set();
  const blacklist = ['加油站','便利店','超市','银行','药店','酒店','厕所','停车','维修','美容','诊所'];
  for (const el of elements) {
    const tags = el.tags || {};
    const clat = el.lat || (el.center && el.center.lat);
    const clng = el.lon || (el.center && el.center.lon);
    if (!clat || !clng) continue;
    const name = tags.name || tags['name:zh'] || '';
    if (!name) continue;
    const nLower = name.toLowerCase();
    if (blacklist.some(b => nLower.includes(b))) continue;
    const key = name.toLowerCase().trim();
    if (seen.has(key)) continue;
    seen.add(key);
    const amenity = tags.amenity || '餐厅';
    const cuisine = tags.cuisine || amenity;
    const dist = calcDistance(lat, lng, clat, clng);
    if (dist > 1200) continue;
    const price = (amenity === 'fast_food' || (tags['price:level'] && parseInt(tags['price:level']) <= 2)) ? '低' : (tags['price:level'] && parseInt(tags['price:level']) >= 4 ? '高' : '中');
    const emoji = guessEmoji((cuisine + ' ' + name));
    cards.push({
      id: 'op_' + (el.type || 'n') + '_' + el.id,
      name: name,
      emoji: emoji,
      cuisine: cuisine,
      tags: ['附近', cuisine === 'restaurant' ? '餐厅' : cuisine === 'fast_food' ? '快餐' : cuisine === 'cafe' ? '咖啡' : cuisine],
      price: price,
      scene: 'all',
      lat: clat,
      lng: clng,
      distance: Math.round(dist),
      source: 'overpass',
      address: tags['addr:full'] || tags['addr:street'] || tags['addr:housenumber'] || ''
    });
  }
  return cards;
}

function calcDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function guessEmoji(text) {
  const c = text.toLowerCase();
  if (/汉堡|burger|mcdonald|kfc|king/.test(c)) return '🍔';
  if (/披萨|pizza/.test(c)) return '🍕';
  if (/鸡|chicken|肯德基/.test(c)) return '🍗';
  if (/寿司|sushi/.test(c)) return '🍣';
  if (/面|拉面|noodle|米线|粉/.test(c)) return '🍜';
  if (/饭|rice|煲仔/.test(c)) return '🍚';
  if (/茶|奶茶|tea|milk.?tea/.test(c)) return '🧋';
  if (/咖啡|coffee|cafe/.test(c)) return '☕';
  if (/火锅|hotpot/.test(c)) return '🍲';
  if (/鱼|fish/.test(c)) return '🐟';
  if (/肠粉|dumpling|饺|云吞/.test(c)) return '🥟';
  if (/串|烧烤|barbecue|grill/.test(c)) return '🍢';
  if (/面包|bakery|cake/.test(c)) return '🥐';
  if (/沙拉|轻食|salad/.test(c)) return '🥗';
  if (/三明治|sandwich/.test(c)) return '🥪';
  return '🍽️';
}

// ---------- 内置数据准备 ----------
function getBuiltinCards() {
  const cards = BUILTIN_DB.map(item => ({
    ...item,
    source: 'local',
    distance: null,
    address: ''
  }));
  if (STATE.userLat && STATE.userLng) {
    for (const c of cards) {
      if (c.lat && c.lng) {
        c.distance = Math.round(calcDistance(STATE.userLat, STATE.userLng, c.lat, c.lng));
      }
    }
  }
  return cards;
}

// ---------- 洗牌 ----------
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ---------- 准备卡片 ----------
async function prepareCards(fromNearby = false) {
  loadingOverlay.style.display = 'flex';
  loadText.textContent = fromNearby ? '📍 正在搜索附近餐厅...' : '🎲 准备美食...';
  let cards = [];

  // 检查缓存
  if (fromNearby && STATE.userLat && STATE.userLng) {
    const cached = getCachedOverpass(STATE.userLat, STATE.userLng);
    if (cached && cached.length > 0) {
      cards = cached;
      showToast(`📍 使用缓存数据，${cached.length} 家附近餐厅`, 1500);
      STATE.cards = cards;
      STATE.currentIndex = 0;
      loadingOverlay.style.display = 'none';
      noCard.style.display = 'none';
      renderCard();
      return true;
    }
  }

  let overpassSuccess = false;
  if (fromNearby && STATE.userLat && STATE.userLng && !STATE.offlineMode) {
    try {
      const elements = await queryOverpass(STATE.userLat, STATE.userLng, 1000);
      if (elements && elements.length > 0) {
        const opCards = overpassToCards(elements, STATE.userLat, STATE.userLng);
        if (opCards.length > 0) {
          cards = opCards;
          overpassSuccess = true;
          setCachedOverpass(STATE.userLat, STATE.userLng, cards);
          showToast(`📍 找到 ${opCards.length} 家附近餐厅！右滑收藏 ❤️`, 1800);
        }
      }
    } catch (e) {
      console.warn('Overpass 查询异常:', e);
    }
  }

  if (!overpassSuccess) {
    cards = getBuiltinCards();
    if (fromNearby && STATE.userLat && STATE.userLng && !STATE.offlineMode) {
      showToast('📡 附近查询不可用，已降级到内置美食库', 2000);
    }
    cards = shuffleArray(cards);
  } else {
    const opNames = new Set(cards.map(c => c.name.toLowerCase().trim()));
    const builtin = getBuiltinCards().filter(c => !opNames.has(c.name.toLowerCase().trim()));
    const mixin = shuffleArray(builtin).slice(0, 10);
    cards = cards.concat(mixin);
    cards = shuffleArray(cards);
  }

  STATE.usedIds = new Set();
  STATE.cards = cards;
  STATE.currentIndex = 0;
  loadingOverlay.style.display = 'none';

  if (cards.length === 0) {
    noCard.style.display = 'flex';
    return false;
  }
  noCard.style.display = 'none';
  renderCard();
  return true;
}

// ---------- 附近搜索（用户主动触发） ----------
async function searchNearby() {
  if (STATE.isSearchingNearby) return;
  if (STATE.offlineMode) {
    showToast('📴 已开启离线模式，关闭后可搜索附近', 2000);
    return;
  }
  STATE.isSearchingNearby = true;
  const loc = await requestLocation();
  if (!loc) {
    STATE.isSearchingNearby = false;
    return;
  }
  await prepareCards(true);
  STATE.isSearchingNearby = false;
  updateStats();
}

// ---------- 卡片渲染 ----------
let currentCardEl = null;
let dragState = null;

function renderCard() {
  if (currentCardEl) {
    currentCardEl.remove();
    currentCardEl = null;
  }
  if (STATE.currentIndex >= STATE.cards.length) {
    noCard.style.display = 'flex';
    return;
  }
  const card = STATE.cards[STATE.currentIndex];
  STATE.usedIds.add(card.id);
  noCard.style.display = 'none';

  const el = document.createElement('div');
  el.className = 'card entering';
  el.innerHTML = `
    <div class="card-inner">
      <div class="source-badge">${card.source === 'overpass' ? '📍 附近' : '📦 推荐'}</div>
      <div class="like-overlay">♥</div>
      <div class="nope-overlay">✕</div>
      <div class="emoji">${card.emoji || '🍽️'}</div>
      <div class="name">${card.name}</div>
      <div class="sub">${card.cuisine || ''}</div>
      <div class="tags">
        ${(card.tags || []).slice(0, 4).map(t => `<span class="tag">${t}</span>`).join('')}
        ${card.price ? `<span class="tag ${card.price === '低' ? 'green' : card.price === '高' ? 'gold' : ''}">${card.price === '低' ? '💰平价' : card.price === '高' ? '💎高档' : '💵中等'}</span>` : ''}
      </div>
      ${card.distance && STATE.showDistance ? `<div class="distance">📍 约 ${card.distance > 1000 ? (card.distance/1000).toFixed(1)+'km' : card.distance+'m'}</div>` : ''}
      ${card.source === 'overpass' && card.address ? `<div class="distance" style="font-size:12px;color:var(--text2);margin-top:2px">${card.address}</div>` : ''}
      <div class="action-hint">← 跳过  ·  ♥ 收藏 →</div>
    </div>
  `;
  cardStack.appendChild(el);
  currentCardEl = el;

  setTimeout(() => {
    el.classList.remove('entering');
  }, 450);

  setupDrag(el, card);
}

// ---------- 拖拽系统 ----------
function setupDrag(el, card) {
  let startX = 0, startY = 0, currentX = 0, currentY = 0;
  let isDragging = false;
  const likeOverlay = el.querySelector('.like-overlay');
  const nopeOverlay = el.querySelector('.nope-overlay');

  function onStart(clientX, clientY) {
    if (STATE.isAnimating) return;
    isDragging = true;
    startX = clientX;
    startY = clientY;
    currentX = 0;
    currentY = 0;
    el.style.transition = 'none';
    el.style.cursor = 'grabbing';
  }

  function onMove(clientX, clientY) {
    if (!isDragging) return;
    const dx = clientX - startX;
    const dy = clientY - startY;
    currentX = dx;
    currentY = dy;
    const rotate = dx * 0.08;
    const opacity = 1 - Math.min(Math.abs(dx) / 400, 0.5);
    el.style.transform = `translateX(${dx}px) translateY(${dy * 0.3}px) rotate(${rotate}deg)`;
    el.style.opacity = opacity;
    if (dx > 40) {
      likeOverlay.style.opacity = Math.min((dx - 40) / 150, 1);
      nopeOverlay.style.opacity = 0;
    } else if (dx < -40) {
      nopeOverlay.style.opacity = Math.min((-dx - 40) / 150, 1);
      likeOverlay.style.opacity = 0;
    } else {
      likeOverlay.style.opacity = 0;
      nopeOverlay.style.opacity = 0;
    }
  }

  function onEnd() {
    if (!isDragging) return;
    isDragging = false;
    STATE.isAnimating = true;
    el.style.cursor = 'grab';
    el.style.transition = 'transform .35s ease, opacity .35s ease';
    if (currentX > 100) {
      el.style.transform = 'translateX(120%) rotate(18deg)';
      el.style.opacity = '0';
      likeOverlay.style.opacity = 1;
      setTimeout(() => handleLike(card, el), 350);
    } else if (currentX < -100) {
      el.style.transform = 'translateX(-120%) rotate(-18deg)';
      el.style.opacity = '0';
      nopeOverlay.style.opacity = 1;
      setTimeout(() => handleNope(card, el), 350);
    } else {
      el.style.transform = 'translateX(0) translateY(0) rotate(0)';
      el.style.opacity = '1';
      likeOverlay.style.opacity = 0;
      nopeOverlay.style.opacity = 0;
      setTimeout(() => { STATE.isAnimating = false; }, 350);
    }
  }

  el.addEventListener('mousedown', (e) => {
    e.preventDefault();
    onStart(e.clientX, e.clientY);
  });
  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    onMove(e.clientX, e.clientY);
  });
  document.addEventListener('mouseup', () => {
    if (!isDragging) return;
    onEnd();
  });

  el.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    onStart(t.clientX, t.clientY);
  }, { passive: true });
  el.addEventListener('touchmove', (e) => {
    if (!isDragging) return;
    const t = e.touches[0];
    onMove(t.clientX, t.clientY);
  }, { passive: true });
  el.addEventListener('touchend', () => {
    if (!isDragging) return;
    onEnd();
  }, { passive: true });
}

// ---------- 交互处理 ----------
function handleLike(card, el) {
  if (!STATE.favorites.find(f => f.id === card.id)) {
    STATE.favorites.push({
      id: card.id, name: card.name, emoji: card.emoji || '🍽️',
      cuisine: card.cuisine || '', tags: card.tags || []
    });
  }
  STATE.stats.liked++;
  STATE.stats.total++;
  STATE.history.push({
    id: card.id, name: card.name, emoji: card.emoji || '🍽️',
    action: 'liked', time: Date.now()
  });
  saveState();
  showToast(`♥ 已收藏 · ${card.name}`, 1200);
  nextCard();
}

function handleNope(card, el) {
  STATE.stats.skipped++;
  STATE.stats.total++;
  STATE.history.push({
    id: card.id, name: card.name, emoji: card.emoji || '🍽️',
    action: 'skipped', time: Date.now()
  });
  saveState();
  nextCard();
}

function nextCard() {
  STATE.currentIndex++;
  if (currentCardEl) {
    currentCardEl.remove();
    currentCardEl = null;
  }
  STATE.isAnimating = false;
  renderCard();
  updateStats();
}

// ---------- 重新洗牌 ----------
async function reshuffle() {
  if (STATE.isAnimating) return;
  if (currentCardEl) {
    currentCardEl.remove();
    currentCardEl = null;
  }
  await prepareCards(false);
  updateStats();
}

// ---------- 更新统计 ----------
function updateStats() {
  $('statTotal').textContent = STATE.stats.total;
  $('statFav').textContent = STATE.favorites.length;
  $('statSkip').textContent = STATE.stats.skipped;
  renderFavorites();
  renderHistory();
}

function renderFavorites() {
  const container = $('favList');
  if (STATE.favorites.length === 0) {
    container.innerHTML = '<div class="empty-hint">还没有收藏</div>';
    return;
  }
  container.innerHTML = STATE.favorites.map((f, i) => `
    <div class="fav-item">
      <span class="fi-emoji">${f.emoji}</span>
      <span class="fi-name">${f.name}</span>
      <button class="fi-del" data-idx="${i}">✕</button>
    </div>
  `).join('');
  container.querySelectorAll('.fi-del').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx);
      STATE.favorites.splice(idx, 1);
      STATE.stats.liked = Math.max(0, STATE.stats.liked - 1);
      saveState();
      updateStats();
      showToast('已取消收藏');
    });
  });
}

function renderHistory() {
  const container = $('historyList');
  if (STATE.history.length === 0) {
    container.innerHTML = '<div class="empty-hint">还没有记录</div>';
    return;
  }
  const recent = STATE.history.slice(-30).reverse();
  container.innerHTML = recent.map(h => `
    <div class="history-item">
      <span class="hi-emoji">${h.emoji}</span>
      <span class="hi-name">${h.name}</span>
      <span class="hi-time">${new Date(h.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
      <span class="hi-action ${h.action}">${h.action === 'liked' ? '♥' : '✕'}</span>
    </div>
  `).join('');
}

// ---------- 键盘控制 ----------
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (!STATE.isAnimating && currentCardEl) {
      const card = STATE.cards[STATE.currentIndex];
      if (card) swipeLeft(card);
    }
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    if (!STATE.isAnimating && currentCardEl) {
      const card = STATE.cards[STATE.currentIndex];
      if (card) swipeRight(card);
    }
  } else if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    reshuffle();
  } else if (e.key === 'n' || e.key === 'N') {
    e.preventDefault();
    searchNearby();
  } else if (e.key === 'm' || e.key === 'M') {
    toggleMenu();
  }
});

function swipeLeft(card) {
  STATE.isAnimating = true;
  currentCardEl.style.transition = 'transform .35s ease, opacity .35s ease';
  currentCardEl.style.transform = 'translateX(-120%) rotate(-18deg)';
  currentCardEl.style.opacity = '0';
  setTimeout(() => handleNope(card, currentCardEl), 350);
}

function swipeRight(card) {
  STATE.isAnimating = true;
  currentCardEl.style.transition = 'transform .35s ease, opacity .35s ease';
  currentCardEl.style.transform = 'translateX(120%) rotate(18deg)';
  currentCardEl.style.opacity = '0';
  setTimeout(() => handleLike(card, currentCardEl), 350);
}

// ---------- 菜单 ----------
function toggleMenu() {
  const overlay = $('menuOverlay');
  const panel = $('menuPanel');
  const isActive = overlay.classList.contains('active');
  overlay.classList.toggle('active');
  panel.classList.toggle('active');
  if (!isActive) updateStats();
}

$('menuBtn').addEventListener('click', toggleMenu);
$('menuClose').addEventListener('click', toggleMenu);
$('menuOverlay').addEventListener('click', toggleMenu);

$('toggleDist').addEventListener('click', function() {
  STATE.showDistance = !STATE.showDistance;
  this.classList.toggle('on');
  saveState();
  if (currentCardEl && STATE.cards[STATE.currentIndex]) {
    const distEl = currentCardEl.querySelector('.distance');
    if (distEl) distEl.style.display = STATE.showDistance ? 'flex' : 'none';
  }
  showToast(STATE.showDistance ? '📍 已显示距离' : '📍 已隐藏距离');
});

$('toggleOffline').addEventListener('click', function() {
  STATE.offlineMode = !STATE.offlineMode;
  this.classList.toggle('on');
  saveState();
  showToast(STATE.offlineMode ? '📴 已开启离线模式，仅使用内置库' : '🌐 已关闭离线模式，可搜索附近');
});

// ---------- 按钮事件 ----------
$('btnNope').addEventListener('click', () => {
  if (STATE.isAnimating || !currentCardEl) return;
  const card = STATE.cards[STATE.currentIndex];
  if (!card) return;
  swipeLeft(card);
});

$('btnLike').addEventListener('click', () => {
  if (STATE.isAnimating || !currentCardEl) return;
  const card = STATE.cards[STATE.currentIndex];
  if (!card) return;
  swipeRight(card);
});

$('btnShuffle').addEventListener('click', reshuffle);
$('btnNearby').addEventListener('click', searchNearby);

// 顶栏定位按钮也触发附近搜索
locBtn.addEventListener('click', searchNearby);

// ---------- 初始化 ----------
async function init() {
  loadState();

  if (!STATE.showDistance) $('toggleDist').classList.remove('on');
  if (STATE.offlineMode) $('toggleOffline').classList.add('on');

  updateStats();

  // 不再自动获取定位！只加载内置库
  await prepareCards(false);
  updateStats();

  // 如果之前有位置缓存，显示个指示
  const lastLoc = localStorage.getItem('eatwhat_last_loc');
  if (lastLoc) {
    try {
      const ll = JSON.parse(lastLoc);
      locBtn.textContent = `📍 点击搜附近`;
      locBtn.classList.add('active');
    } catch(e) {}
  }
}

init().catch(console.error);
</script>
</body>
</html>
